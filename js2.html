<!DOCTYPE html>
<html>
    <body>
        <script>
            var small;
            var big;
            num1 = prompt("Enter a number:")
            num2 = prompt("Enter another number:")
            if(parseFloat(num1) > num2){
                big = num1;
                small = num2
            } else{
                big = num2;
                small = num1;
            }
            console.log(small + " " + big);
        </script>
        <p>Open console for the result</p>
    </body>
</html>
